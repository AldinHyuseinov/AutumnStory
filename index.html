<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Есенна приключения: Нахрани животните</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Начален екран -->
    <div id="start-screen">
      <div class="start-box">
        <h1>Есенни приключения в гората</h1>
        <p>Животните се подготвят за зимата. Ще им помогнеш ли да си намерят храна?</p>
        <button id="start-btn">Започни играта</button>
      </div>
    </div>

    <div id="game-area">
      <!-- Фонов слой -->
      <div id="bg-image"></div>

      <!-- Инструкции -->
      <div class="instructions">
        <h1>Есенна гора</h1>
        <p>Всяко животно иска по ДВЕ лакомства!</p>
      </div>

      <!-- Бутон за звук горе вдясно -->
      <img src="./assets/volume.png" id="volume-btn" alt="Звук" draggable="false" />

      <!-- Панел за контрол на звука -->
      <div id="volume-panel">
        <h2>Сила на звука</h2>
        <div class="slider-container">
          <!-- Иконка за тихо -->
          <img src="./assets/mute.png" alt="Тихо" draggable="false" />

          <!-- Плъзгач -->
          <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8" />

          <!-- Иконка за силно -->
          <img src="./assets/volume.png" alt="Силно" draggable="false" />
        </div>
        <button id="close-volume">Готово</button>
      </div>

      <!-- Контейнер за падащите листа -->
      <div id="leaves-container"></div>

      <!-- Балонче за реч (Диалог) -->
      <div id="speech-bubble"></div>

      <div class="game-layer">
        <!-- Животни (Цели) -->
        <img src="./assets/bear.png" id="bear" class="animal" alt="Мечка" draggable="false" />
        <img
          src="./assets/squirrel.png"
          id="squirrel"
          class="animal"
          alt="Катерица"
          draggable="false"
        />
        <img
          src="./assets/hedgehog.png"
          id="hedgehog"
          class="animal"
          alt="Таралеж"
          draggable="false"
        />

        <!-- Храни за Мечката -->
        <img
          src="./assets/fish.png"
          id="fish"
          class="food"
          data-target="bear"
          alt="Риба"
          draggable="false"
        />
        <img
          src="./assets/honey.png"
          id="beehive"
          class="food"
          data-target="bear"
          alt="Кошер с мед"
          draggable="false"
        />

        <!-- Храни за Катерицата -->
        <img
          src="./assets/acorn.png"
          id="acorn"
          class="food"
          data-target="squirrel"
          alt="Жълъд"
          draggable="false"
        />
        <img
          src="./assets/walnut.png"
          id="walnut"
          class="food"
          data-target="squirrel"
          alt="Орех"
          draggable="false"
        />

        <!-- Храни за Таралежа -->
        <img
          src="./assets/apple.png"
          id="apple"
          class="food"
          data-target="hedgehog"
          alt="Ябълка"
          draggable="false"
        />
        <img
          src="./assets/mushroom.png"
          id="mushroom"
          class="food"
          data-target="hedgehog"
          alt="Гъба"
          draggable="false"
        />

        <img src="./assets/chips.png" id="chips" class="food" alt="Чипс" draggable="false" />
      </div>
    </div>

    <!-- Екран при победа -->
    <div id="victory-screen">
      <h1>Браво!</h1>
      <p>Ти нахрани всички животни за зимата!</p>
      <button onclick="location.reload()">Играй отново</button>
    </div>

    <!-- Аудио файлове -->
    <audio id="bg-music" loop>
      <source src="./assets/ambient-sounds.mp3" type="audio/mpeg" />
    </audio>

    <audio id="success-sound">
      <source src="./assets/success.mp3" type="audio/mpeg" />
    </audio>

    <audio id="error-sound">
      <source src="./assets/error.mp3" type="audio/mpeg" />
    </audio>

    <!-- Звук за победа (празничен) -->
    <audio id="victory-sound">
      <source src="./assets/victory.mp3" type="audio/mpeg" />
    </audio>

    <!-- Гласът на мечката (всички реплики в един файл) -->
    <audio id="bear-voice-file">
      <source src="./assets/bear-voice.wav" type="audio/mpeg" />
    </audio>

    <!-- Гласът на катерицата (всички реплики в един файл) -->
    <audio id="squirrel-voice-file">
      <source src="./assets/squirrel-voice.wav" type="audio/mpeg" />
    </audio>

    <!-- Гласът на таралежа (всички реплики в един файл) -->
    <audio id="hedgehog-voice-file">
      <source src="./assets/hedgehog-voice.wav" type="audio/mpeg" />
    </audio>

    <script src="script.js"></script>
  </body>
</html>
